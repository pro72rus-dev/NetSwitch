<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a73e8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00c4b4;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4fc3f7;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#00e5ff;stop-opacity:0.6" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="256" cy="256" r="240" fill="url(#bg)" />
  
  <!-- Outer ring (network) -->
  <circle cx="256" cy="256" r="200" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="8" />
  
  <!-- Network nodes -->
  <circle cx="256" cy="80" r="16" fill="rgba(255,255,255,0.9)" />
  <circle cx="406" cy="170" r="16" fill="rgba(255,255,255,0.9)" />
  <circle cx="406" cy="342" r="16" fill="rgba(255,255,255,0.9)" />
  <circle cx="256" cy="432" r="16" fill="rgba(255,255,255,0.9)" />
  <circle cx="106" cy="342" r="16" fill="rgba(255,255,255,0.9)" />
  <circle cx="106" cy="170" r="16" fill="rgba(255,255,255,0.9)" />
  
  <!-- Network lines -->
  <line x1="256" y1="96" x2="390" y2="170" stroke="rgba(255,255,255,0.3)" stroke-width="4" />
  <line x1="406" y1="186" x2="406" y2="326" stroke="rgba(255,255,255,0.3)" stroke-width="4" />
  <line x1="390" y1="342" x2="272" y2="432" stroke="rgba(255,255,255,0.3)" stroke-width="4" />
  <line x1="240" y1="432" x2="122" y2="342" stroke="rgba(255,255,255,0.3)" stroke-width="4" />
  <line x1="106" y1="326" x2="106" y2="186" stroke="rgba(255,255,255,0.3)" stroke-width="4" />
  <line x1="122" y1="170" x2="240" y2="96" stroke="rgba(255,255,255,0.3)" stroke-width="4" />
  
  <!-- Power symbol - circle -->
  <circle cx="256" cy="256" r="90" fill="none" stroke="white" stroke-width="14" stroke-linecap="round" />
  
  <!-- Power symbol - line -->
  <line x1="256" y1="166" x2="256" y2="230" stroke="white" stroke-width="14" stroke-linecap="round" />
  
  <!-- Glow effect -->
  <circle cx="256" cy="256" r="100" fill="none" stroke="url(#glow)" stroke-width="4" opacity="0.5" />
</svg>
