<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a73e8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00c4b4;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect x="2" y="2" width="60" height="60" rx="14" fill="url(#bg)" />
  
  <!-- Power circle -->
  <circle cx="32" cy="34" r="14" fill="none" stroke="white" stroke-width="3.5" stroke-linecap="round" />
  
  <!-- Power line -->
  <line x1="32" y1="20" x2="32" y2="27" stroke="white" stroke-width="3.5" stroke-linecap="round" />
</svg>
